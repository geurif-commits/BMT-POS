version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bmtechrd_pos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: ["pg_data:/var/lib/postgresql/data"]
  backend:
    build: ./backend
    env_file: ./backend/.env
    ports: ["4000:4000"]
    depends_on: [db]
  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    depends_on: [backend]
volumes:
  pg_data:
